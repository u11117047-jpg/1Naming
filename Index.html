<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 藝名神器 ✨</title>
    <style>
        :root {
            --bg-main: #0a0a0c;
            --card-bg: #141416;
            --card-border: #2a2a2d;
            
            /* 燙金漸層色碼 */
            --gold-light: #fcf6ba;
            --gold-main: #d4af37;
            --gold-dark: #aa771c;
            --gold-gradient: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            
            --text-gray: #a0a0a0;
        }

        body {
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
            background-color: var(--bg-main);
            background-image: radial-gradient(circle at 50% 0%, #1f1f1f 0%, #0a0a0c 70%);
            background-attachment: fixed;
            margin: 0; 
            padding: 20px; 
            color: #fff;
            min-height: 100vh;
        }

        /* 燙金文字特效 */
        .text-gold {
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.5);
            font-weight: bold;
        }

        /* 金色邊框特效 */
        .border-gold {
            position: relative;
            border: 1px solid transparent;
            background-clip: padding-box;
            border-radius: 20px;
        }
        .border-gold::before {
            content: '';
            position: absolute;
            top: -2px; bottom: -2px; left: -2px; right: -2px;
            background: var(--gold-gradient);
            z-index: -1;
            border-radius: 22px;
            opacity: 0.6;
            transition: 0.3s;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 頁面切換控制 */
        .page {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }
        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-title {
            text-align: center;
            font-size: 3rem;
            margin: 20px 0 40px;
            letter-spacing: 2px;
            white-space: nowrap;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            margin-bottom: 25px;
        }

        /* 修改了標題排版，確保強制同一行 */
        .section-title {
            font-size: 1.2rem;
            margin: 25px 0 15px;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }
        .section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 18px;
            background: var(--gold-gradient);
            margin-right: 10px;
            border-radius: 2px;
        }
        .optional-mark {
            font-size: 0.85rem;
            color: #777;
            font-weight: normal;
            margin-left: 10px;
            letter-spacing: 1px;
        }

        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        /* 標籤按鈕樣式 */
        .tag {
            background: #1e1e1e;
            color: var(--text-gray);
            border: 1px solid #333;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            user-select: none;
        }
        .tag:hover {
            border-color: var(--gold-main);
            color: var(--gold-light);
        }
        .tag.active {
            background: var(--gold-gradient);
            color: #000;
            border-color: transparent;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .btn-main {
            display: block;
            width: fit-content;
            margin: 40px auto;
            background: var(--gold-gradient);
            color: #000;
            border: none;
            padding: 18px 60px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn-main:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.5);
        }

        .btn-secondary {
            display: block;
            width: fit-content;
            margin: 30px auto 10px;
            background: #1e1e1e;
            color: var(--gold-main);
            border: 2px solid var(--gold-main);
            padding: 15px 50px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 2px;
        }
        .btn-secondary:hover {
            background: rgba(212, 175, 55, 0.1);
            transform: scale(1.05);
        }

        /* 第二頁佈局：結果與候選清單 */
        .layout-p2 {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 25px;
        }
        @media (max-width: 900px) {
            .layout-p2 { grid-template-columns: 1fr; }
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .name-card {
            background: #181818;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .name-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: var(--gold-gradient);
            opacity: 0;
            transition: 0.3s;
        }
        .name-card:hover {
            transform: translateY(-5px);
            background: #222;
            border-color: var(--gold-main);
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
        }
        .name-card:hover::before { opacity: 1; }
        
        .name-main {
            font-size: 2.8rem;
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }
        .name-tags {
            font-size: 0.85rem;
            color: var(--text-gray);
            line-height: 1.4;
            margin-top: auto;
        }
        .match-score {
            position: absolute;
            top: 10px; right: 10px;
            background: rgba(212, 175, 55, 0.2);
            color: var(--gold-light);
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
        }

        /* 側邊欄：候選名單 */
        .shortlist-box {
            position: sticky;
            top: 20px;
            height: fit-content;
        }
        .list-item {
            background: #1e1e1e;
            border-left: 4px solid var(--gold-main);
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
        }
        .del-btn {
            background: transparent;
            color: var(--text-gray);
            border: 1px solid #444;
            width: 32px; height: 32px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
        }
        .del-btn:hover {
            color: #ff4d4d;
            border-color: #ff4d4d;
            background: rgba(255, 77, 77, 0.1);
        }

        .btn-outline {
            background: transparent;
            color: var(--gold-main);
            border: 1px solid var(--gold-main);
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
        }
        .btn-outline:hover {
            background: rgba(212, 175, 55, 0.1);
        }
        
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
    </style>
</head>

    let selectedTags = new Set();
    let shortlist = [];
    let generatedHistory = new Set(); 

    // --- 3. 初始化畫面 (渲染第一頁標籤) ---
    function initUI() {
        const container = document.getElementById('tags-container');
        for (const [category, tags] of Object.entries(tagCategories)) {
            const title = document.createElement('div');
            title.className = 'section-title text-gold';
            title.innerHTML = `${category} <span class="optional-mark">(可選可不選)</span>`;
            container.appendChild(title);

            const group = document.createElement('div');
            group.className = 'tag-group';
            
            tags.forEach(tagObj => {
                const btn = document.createElement('div');
                btn.className = 'tag';
                btn.textContent = tagObj.text; // 畫面上顯示中文
                // 點擊時，記錄的是背後的代碼 (如 A1, C3)
                btn.onclick = () => toggleTag(btn, tagObj.code);
                group.appendChild(btn);
            });
            container.appendChild(group);
        }

        // 顯示載入成功狀態
        document.getElementById('loading-status').textContent = `✅ 成功載入 ${nameDatabase.length} 筆靈感資料庫！`;
        document.getElementById('main-gen-btn').disabled = false;
    }

    function toggleTag(btnElement, tagCode) {
        if (selectedTags.has(tagCode)) {
            selectedTags.delete(tagCode);
            btnElement.classList.remove('active');
        } else {
            selectedTags.add(tagCode);
            btnElement.classList.add('active');
        }
    }

    // --- 4. 演算法：計分、過濾重複與生成 ---
    function generateAndGoToPage2() {
        generatedHistory.clear();
        processGeneration();
        showPage(2);
    }

    function generateMore() {
        processGeneration();
    }

    function processGeneration() {
        const userTags = Array.from(selectedTags);
        let results = [];

        let scoredDB = nameDatabase.map(item => {
            let score = 0;
            let matchedTags = [];
            
            if (Array.isArray(item.tags)) {
                item.tags.forEach(t => {
                    if (userTags.includes(t)) {
                        score++;
                        matchedTags.push(t);
                    }
                });
            }
            return { ...item, score, matchedTags };
        });

        let availableDB = scoredDB.filter(item => {
            if (generatedHistory.has(item.name)) {
                return Math.random() < 0.03; 
            }
            return true;
        });

        if (availableDB.length < 9) {
            generatedHistory.clear();
            availableDB = scoredDB; 
        }

        availableDB.sort((a, b) => {
            if (userTags.length > 0 && b.score !== a.score) {
                return b.score - a.score;
            }
            return 0.5 - Math.random(); 
        });

        results = availableDB.slice(0, 9);
        results.forEach(r => generatedHistory.add(r.name));

        renderResults(results);
    }

    function renderResults(results) {
        const area = document.getElementById('resultArea');
        area.innerHTML = ''; 

        results.forEach(item => {
            const div = document.createElement('div');
            div.className = 'name-card';
            
            let scoreHtml = '';
            if (selectedTags.size > 0 && item.score > 0) {
                scoreHtml = `<div class="match-score">🔥 命中 ${item.score} 標籤</div>`;
            } else if (selectedTags.size > 0 && item.score === 0) {
                scoreHtml = `<div class="match-score" style="color:#888; background:#333;">💡 拓展推薦</div>`;
            }

            const safeTags = Array.isArray(item.tags) ? item.tags : [];
            // 將 A1, B4 轉換回中文顯示，找不到對應就原樣顯示
            const displayTags = safeTags.map(code => codeToText[code] || code).slice(0, 4).join(' #');

            div.innerHTML = `
                ${scoreHtml}
                <span class="name-main text-gold">${item.name}</span>
                <span class="name-tags">#${displayTags}</span>
            `;
            div.onclick = () => addToList(item.name);
            area.appendChild(div);
        });
    }

    // --- 5. 候選名單功能 ---
    function addToList(name) {
        if (!shortlist.includes(name)) {
            shortlist.push(name);
            renderList();
        }
    }

    function remove(name) {
        shortlist = shortlist.filter(n => n !== name);
        renderList();
    }

    function clearList() { 
        shortlist = []; 
        renderList();
    }

    function renderList() {
        const container = document.getElementById('listItems');
        if (shortlist.length === 0) {
            container.innerHTML = `<p style="color: #666; text-align: center; margin: 40px 0;">點擊左側名字<br>即可收藏至此</p>`;
            return;
        }
        container.innerHTML = shortlist.map(n => `
            <div class="list-item">
                <span class="text-gold">${n}</span>
                <button class="del-btn" onclick="remove('${n}')">✕</button>
            </div>
        `).join('');
    }

    // --- 6. 頁面切換控制 ---
    function showPage(pageNum) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page' + pageNum).classList.add('active');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function goToPage1() {
        showPage(1);
    }

    initUI();
